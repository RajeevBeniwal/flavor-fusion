<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Menu – Flavor Fusion</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="announce-bar" id="announceBar"></div>

<header class="app-bar">
  <div class="app-bar-inner">
    <a class="brand" href="index.html">
      <div class="brand-logo" id="brandLogo">🍽️</div>
      <span class="brand-name" id="brandName">Flavor Fusion</span>
    </a>
    <div class="app-bar-spacer"></div>
    <nav class="app-bar-nav" id="topNav">
      <a href="index.html">🏠 Home</a>
      <a href="menu.html" class="active">📋 Menu</a>
      <a href="order.html">🛒 Cart</a>
      <a href="admin.html">🔐 Admin</a>
    </nav>
    <button class="cart-btn desktop-cart" id="cartBtn" onclick="openCart()">
      🛒 Cart
      <span class="cart-badge" id="cartBadge" style="display:none">0</span>
    </button>
    <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- CATEGORY STRIP (sticky) -->
<div class="cat-strip" id="catStrip" style="top:62px">
  <div class="cat-strip-inner" id="catPills"></div>
</div>

<!-- SEARCH BAR -->
<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px">
  <div class="container" style="max-width:1280px">
    <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search dishes…" oninput="filterMenu()" style="max-width:400px"/>
  </div>
</div>

<!-- MENU BODY -->
<main style="padding:32px 0">
  <div class="container" id="menuBody">
    <div style="color:var(--text-lt);text-align:center;padding:40px">Loading menu…</div>
  </div>
</main>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-head">
    <h3>🛒 Your Cart</h3>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter"></div>
</div>

<!-- FAB CART (mobile) -->
<button class="fab-cart" id="fabCart" onclick="openCart()" style="display:none">
  🛒 View Cart <span class="fab-count" id="fabCount">0</span>
</button>

<footer style="background:#1a1a1a;color:rgba(255,255,255,.4);text-align:center;padding:20px;font-size:.78rem">
  © 2024 Flavor Fusion, Patiala · <a href="index.html" style="color:rgba(255,255,255,.5);text-decoration:none">Home</a>
</footer>

<nav class="bottom-nav">
  <a class="bn-item" href="index.html"><div class="bn-icon">🏠</div><div class="bn-label">Home</div></a>
  <a class="bn-item active" href="menu.html"><div class="bn-icon">📋</div><div class="bn-label">Menu</div></a>
  <a class="bn-item" href="order.html"><div class="bn-icon">🛒</div><div class="bn-label">Cart</div><div class="bn-badge" id="bnBadge" style="display:none">0</div></a>
  <a class="bn-item" href="admin.html"><div class="bn-icon">⚙️</div><div class="bn-label">Admin</div></a>
</nav>

<script src="datastore.js"></script>
<script src="common.js"></script>
<script>
var allItems=[],allCats=[],activeCategory='all';

(async function(){
  await DataStore.load();
  const R = DataStore.get('restaurant');
  document.getElementById('brandName').textContent = R.name||'Flavor Fusion';
  if(R.logo){ document.getElementById('brandLogo').innerHTML='<img src="'+R.logo+'" alt="logo" />'; }
  const ab = document.getElementById('announceBar');
  if(R.announcement){ ab.textContent=R.announcement; } else{ ab.style.display='none'; }

  allCats  = DataStore.get('categories').slice().sort((a,b)=>a.order-b.order);
  allItems = DataStore.get('menuItems');

  buildCategoryPills();
  renderMenu('all');

  // Check if we should jump to a category from homepage
  const hash = location.hash.replace('#','');
  if(hash) switchCategory(hash);

  Cart.onChange(()=>{ updateCartBadges(); renderCartDrawer(); });
  updateCartBadges();
  renderCartDrawer();
})();

function buildCategoryPills(){
  const strip = document.getElementById('catPills');
  strip.innerHTML = '<button class="cat-pill active" data-id="all" onclick="switchCategory(\'all\')">🍽️ All</button>'+
    allCats.map(c=>`<button class="cat-pill" data-id="${c.id}" onclick="switchCategory('${c.id}')">${c.icon||''} ${c.name}</button>`).join('');
}

function switchCategory(id){
  activeCategory=id;
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  renderMenu(id);
  if(id!=='all'){
    const sec=document.getElementById('sec_'+id);
    if(sec) sec.scrollIntoView({behavior:'smooth',block:'start'});
  }
}

function filterMenu(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  if(!q){ renderMenu(activeCategory); return; }
  const filtered = allItems.filter(x=>x.name.toLowerCase().includes(q)||(x.description||'').toLowerCase().includes(q));
  const body=document.getElementById('menuBody');
  if(!filtered.length){ body.innerHTML='<div class="empty-state"><div class="es-icon">🔍</div><h4>No results for "'+q+'"</h4><p>Try a different search term.</p></div>'; return; }
  body.innerHTML='<div class="section-head mb-md"><h2>Search Results</h2></div><div class="menu-grid">'+filtered.map(renderCard).join('')+'</div>';
}

function renderMenu(catId){
  const body=document.getElementById('menuBody');
  let html='';
  if(catId==='all'){
    allCats.forEach(c=>{
      const catItems=allItems.filter(x=>x.categoryId===c.id);
      if(!catItems.length) return;
      html+=`<div id="sec_${c.id}" style="margin-bottom:44px">
        <div class="section-head" style="margin-bottom:20px">
          <h2 style="font-size:1.6rem">${c.icon||''} ${c.name}</h2>
          <div class="divider-line"><span>✦</span></div>
        </div>
        <div class="menu-grid">${catItems.map(renderCard).join('')}</div>
      </div>`;
    });
    if(!html) html='<div class="empty-state"><div class="es-icon">🍽️</div><h4>Menu loading...</h4><p>If this persists, check data.json.</p></div>';
  } else {
    const c=allCats.find(x=>x.id===catId);
    const catItems=allItems.filter(x=>x.categoryId===catId);
    if(!catItems.length){ html='<div class="empty-state"><div class="es-icon">🍽️</div><h4>No items in this category yet.</h4></div>'; }
    else{
      html=`<div id="sec_${catId}" style="margin-bottom:44px">
        <div class="section-head" style="margin-bottom:20px">
          <h2 style="font-size:1.6rem">${c?c.icon:''} ${c?c.name:''}</h2>
          <div class="divider-line"><span>✦</span></div>
        </div>
        <div class="menu-grid">${catItems.map(renderCard).join('')}</div>
      </div>`;
    }
  }
  body.innerHTML=html;
}

function renderCard(item){
  const q=Cart.qty(item.id);
  return `
  <div class="menu-card" id="card_${item.id}">
    <div class="menu-card-img">
      ${item.image?`<img src="${item.image}" alt="${item.name}" />`:''}
      <span class="img-emoji"${item.image?' style="display:none"':''}>${itemEmoji(item)}</span>
      <div class="menu-card-badges">
        ${item.isBestseller?'<span class="badge-bestseller">Bestseller</span>':''}
        ${item.isFeatured?'<span class="badge-featured">Featured</span>':''}
      </div>
      <div class="veg-dot ${item.isVeg?'veg':'nonveg'}"></div>
    </div>
    <div class="menu-card-body">
      <div class="menu-card-name">${item.name}</div>
      <div class="menu-card-desc">${item.description||''}</div>
    </div>
    <div class="menu-card-foot">
      <div class="menu-card-price">${fmt(item.price)}</div>
      <div id="ctrl_${item.id}">
        ${q>0
          ? `<div class="qty-ctrl"><button onclick="changeQty('${item.id}',-1)">−</button><span class="qty-num">${q}</span><button onclick="changeQty('${item.id}',1)">+</button></div>`
          : `<button class="add-btn" onclick="addToCart('${item.id}')"${!item.isAvailable?' disabled style="opacity:.5;cursor:not-allowed"':''}>+ Add</button>`
        }
      </div>
    </div>
    ${!item.isAvailable?'<div class="unavailable-overlay"><span>Unavailable</span></div>':''}
  </div>`;
}

function addToCart(id){
  const item=allItems.find(x=>x.id===id);
  if(!item||!item.isAvailable) return;
  Cart.add(item);
  refreshCtrl(id);
  toast(item.name+' added!','success');
}
function changeQty(id,d){
  const q=Cart.qty(id)+d; Cart.update(id,q); refreshCtrl(id);
}
function refreshCtrl(id){
  const q=Cart.qty(id);
  const el=document.getElementById('ctrl_'+id);
  if(!el) return;
  el.innerHTML=q>0
    ? `<div class="qty-ctrl"><button onclick="changeQty('${id}',-1)">−</button><span class="qty-num">${q}</span><button onclick="changeQty('${id}',1)">+</button></div>`
    : `<button class="add-btn" onclick="addToCart('${id}')">+ Add</button>`;
  updateCartBadges();
}

// CART DRAWER
function openCart(){ document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartDrawer').classList.add('open'); renderCartDrawer(); }
function closeCart(){ document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartDrawer').classList.remove('open'); }

function renderCartDrawer(){
  const items=Cart.all();
  const R=DataStore.get('restaurant');
  const ci=document.getElementById('cartItems');
  const cf=document.getElementById('cartFooter');
  if(!items.length){
    ci.innerHTML='<div class="cart-empty"><div class="icon">🛒</div><h4>Cart is Empty</h4><p>Add items from the menu</p></div>';
    cf.innerHTML='';
    return;
  }
  ci.innerHTML=items.map(it=>`
    <div class="cart-item">
      <div class="cart-item-img">
        ${it.image?`<img src="${it.image}" alt="${it.name}" />`:'🍽️'}
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${it.name}</div>
        <div class="cart-item-price">${fmt(it.price)} × ${it.qty} = ${fmt(it.price*it.qty)}</div>
        <div class="qty-ctrl" style="margin-top:6px">
          <button onclick="changeQty('${it.id}',-1)">−</button>
          <span class="qty-num">${it.qty}</span>
          <button onclick="changeQty('${it.id}',1)">+</button>
        </div>
      </div>
      <button class="cart-item-remove" onclick="Cart.remove('${it.id}');renderCartDrawer();updateCartBadges();">✕</button>
    </div>`).join('');
  const sub=Cart.subtotal();
  const gst=(R.gst||5); const tax=sub*(gst/100);
  cf.innerHTML=`
    <div class="cart-summary">
      <div class="cart-row"><span>Subtotal</span><span>${fmt(sub)}</span></div>
      <div class="cart-row"><span>GST (${gst}%)</span><span>${fmt(tax)}</span></div>
      <div class="cart-row total"><span>Total</span><span>${fmt(sub+tax)}</span></div>
    </div>
    <a href="order.html" class="btn btn-red btn-block btn-lg" onclick="closeCart()">Proceed to Order →</a>
    <button onclick="Cart.clear();renderCartDrawer();updateCartBadges();" class="btn btn-ghost btn-block btn-sm" style="margin-top:8px">Clear Cart</button>`;
}
</script>
</body>
</html>
